# Weekly Discovery — обновляет docs/site/ и history (projects.csv read-only, каталог не на сайте)
name: Weekly Discovery Scan

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Config
        run: test -f config.yaml || cp config.example.yaml config.yaml

      - name: Run Discovery Agent (read-only catalog)
        run: python run_discovery.py scan

      - name: Publish site (candidates only)
        run: python scripts/publish_site.py

      - name: Commit reports and site
        run: |
          git config user.name "Atlas Discovery Bot"
          git config user.email "discovery@atlas.local"
          git add docs/site/ data/discovery_history/
          git diff --staged --quiet || git commit -m "discovery: weekly scan $(date -u +%Y-%m-%d)"
          git push || true
